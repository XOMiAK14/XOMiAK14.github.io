<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование стола</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        input, button { width: 80%; margin: 10px 0; padding: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="app">
        <h2>Бронирование стола</h2>
        <input type="text" id="name" placeholder="Ваше имя" required><br>
        <input type="tel" id="phone" placeholder="Телефон" required><br>
        <input type="number" id="table" placeholder="Номер стола" required><br>
        <button onclick="sendData()">Забронировать</button>
    </div>

    <div id="error" class="hidden">
        <h2>Ошибка доступа</h2>
        <p>Эта страница доступна только через Telegram Web Apps.</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;

        if (!tg.initDataUnsafe || !tg.initData) {
            // Если сайт открыт не из Telegram, скрываем форму и показываем ошибку
            document.getElementById("app").style.display = "none";
            document.getElementById("error").classList.remove("hidden");
        } else {
            tg.expand(); // Раскрываем WebApp на весь экран
        }

        function sendData() {
            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let table = document.getElementById("table").value;

            if (!name || !phone || !table) {
                alert("Заполните все поля!");
                return;
            }

            let data = JSON.stringify({ имя: name, телефон: phone, стол: table });
            tg.sendData(data);
            tg.close();
        }
    </script>
</body>
</html>
